{% extends 'dashboard/base.html' %}

{% block title %}{% if object %}Editar usuário{% else %}Novo usuário{% endif %}{% endblock %}

{% block content %}
<section class="card">
  <h1>{% if object %}Editar usuário{% else %}Novo usuário{% endif %}</h1>
  <form method="post" class="stack-form">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="actions">
      <button type="submit">Salvar</button>
      <a href="{% url 'dashboard:user_list' %}">Cancelar</a>
    </div>
  </form>
</section>
{% endblock %}
